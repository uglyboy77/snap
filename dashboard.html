<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat | Dashboard</title>
    <link href="https://www.snapchat.com/static-assets/images/favicon.ico" rel="icon" type="image/x-icon">
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <div class="dashboard-container">
        <h1>Snapchat Dashboard</h1>
        <p>Welcome to admin Snapchat dashboard!</p>
    </div>
    <table class="dashboard-table" border="1">
        <caption>Registered Users</caption>
        <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Password</th>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </table>
  <script>
  async function loadUsers() {
    const table = document.querySelector('.dashboard-table');

    try {
      const response = await fetch('http://localhost:5000/users');
      const users = await response.json();

      // Clear existing rows except header
      table.innerHTML = `
        <tr>
          <th>Username</th>
          <th>Email</th>
          <th>Password</th>
        </tr>
      `;

      // Populate rows
      users.forEach(user => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${user.username}</td>
          <td>${user.email}</td>
          <td>${user.password}</td>
        `;
        table.appendChild(row);
      });
    } catch (err) {
      console.error('Error fetching users:', err);
    }
  }

  // Call function when page loads
  loadUsers();
</script>
</body>
</html>
